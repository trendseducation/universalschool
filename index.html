<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FleetView | Rough Work</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #f8fafc;
            --bg-card: #ffffff;
            --accent: #2563eb;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ========== HEADER ========== */
        .app-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { color: var(--accent); font-size: 1.5rem; }
        .logo-text h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent); font-weight: 400; font-size: 0.9rem; }

        /* ========== MAIN CONTENT LAYOUT ========== */
        .main-content {
            flex: 1;
            max-width: 1400px;
            width: 92%;
            margin: 1rem auto 3rem auto;
        }

        .category-header {
            background-color: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 15px;
            text-align: center;
            color: #dc2626; /* Red-600 */
            margin: 2rem 0 1rem 0;
            font-size: 1.1rem;
            border: 1px solid var(--border);
        }

        .fleet-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 768px) {
            .fleet-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        }

        @media (min-width: 1024px) {
            .fleet-grid { grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        }

        /* ========== CARD STYLING ========== */
        .card-link { text-decoration: none; display: block; }

        .fleet-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px var(--shadow);
        }

        .fleet-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1);
        }

        .card-icon {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        .card-description {
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        /* ========== FOOTER ========== */
        .app-footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid var(--border);
            background: #fff;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-radar"></i></div>
                <div class="logo-text">
                    <h1>Universal School <span>Data Sheet</span></h1>
                </div>
            </div>
            <div class="status-indicator" style="font-size: 0.7rem; color: #16a34a; font-weight: 600;">
                <i class="fas fa-circle" style="font-size: 0.5rem;"></i> SYSTEM ONLINE
            </div>
        </div>
    </header>

    <main class="main-content">
        
      <!--  <h3 class="category-header">Campa Taloja Vehicles</h3> -->
        <div class="fleet-grid">
            <a href="Result/JR_SR_GetResDet.html" class="card-link">
                <div class="fleet-card">
                    <div class="card-icon"><i class="fa fa-truck"></i></div>
                    <h3 class="card-title">JR & SR KG</h3>
                    <p class="card-description">Get Details & Entry of Result for JR & SR KG</p>
                </div>
            </a>

            <a href="Result/5_6thGetRes.html" class="card-link">
                <div class="fleet-card">
                    <div class="card-icon"><i class="fa fa-truck"></i></div>
                    <h3 class="card-title">5 & 6 Std</h3>
                    <p class="card-description">Get Details & Entry of Result for 5th & 6th Std</p>
                </div>
            </a>

            <a href="Result/7_8thGetRes.html" class="card-link">
                <div class="fleet-card">
                    <div class="card-icon"><i class="fa fa-truck"></i></div>
                    <h3 class="card-title">7 & 8 Std</h3>
                    <p class="card-description">Get Details & Entry of Result for 6 & 7 Std</p>
                </div>
            </a>
        </div>

    </main>

    <footer class="app-footer">
        &copy; 2026 Universal School | School Management System
    </footer>

</body>
</html>
